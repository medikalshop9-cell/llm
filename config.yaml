# training/config.yaml
# AfriLearn — QLoRA fine-tuning configuration
# All hyperparameters live here. Do not hardcode values in train.py.

model:
  base_model: "google/gemma-2-12b"       # Gemma 2 12B base (Apache 2.0)
  fallback_model: "google/gemma-2-9b"    # If 12B OOMs on your GPU
  max_seq_length: 2048
  load_in_4bit: true                     # QLoRA 4-bit quantization
  dtype: null                            # null = auto-detect bf16/fp16

lora:
  r: 16                                  # LoRA rank. Increase to 32 if underfitting after 3 epochs.
  lora_alpha: 16                         # Usually set equal to r
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  use_gradient_checkpointing: "unsloth"  # Saves ~30% VRAM
  use_rslora: false
  random_state: 42

training:
  output_dir: "./outputs/afrilearn-gemma-12b-qlora"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4        # Effective batch size = 8
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  fp16: false
  bf16: true                            # Use bf16 on A100/H100. Set false + fp16 true on older GPUs.
  logging_steps: 50
  save_steps: 500
  save_total_limit: 3
  optim: "adamw_8bit"                   # 8-bit Adam reduces VRAM
  report_to: "none"                     # Set to "wandb" if you want experiment tracking
  seed: 42
  dataloader_num_workers: 2

data:
  train_file: "data/processed/afrilearn_train.jsonl"
  eval_file: "data/processed/afrilearn_eval.jsonl"
  eval_split_ratio: 0.1                 # 90% train, 10% eval — applied at load time if eval_file missing
  dataset_num_proc: 2
  text_field: "text"                    # Field name after prompt formatting

# Prompt template — Alpaca format
prompt:
  template: |
    Below is an instruction for AfriLearn, an offline AI tutor for primary school children in Ghana and Nigeria.

    ### Instruction:
    {instruction}

    ### Input:
    {input}

    ### Response:
    {output}
  eos_appended: true                    # Append tokenizer.eos_token after each example
